// ============================================================
// TweakScale Hi-Sci Penalty — Конфигурация
// ============================================================
// Этот мод увеличивает стоимость высокотехнологичных деталей
// при изменении их размера через TweakScale.
//
// Логика работы:
// - Уменьшение детали: цена = базовая_цена * (станд.размер / текущий.размер)^massExponent * penaltyMultiplier
// - Увеличение детали: цена = базовая_цена * (текущий.размер / станд.размер)^massExponent
// - massExponent берётся из TweakScale (обычно 3, как для массы)
// - Стандартный размер: цена не меняется
//
// ПРИМЕР для massExponent = 3 и penaltyMultiplier = 1.0:
//   Деталь за 1000 кредитов:
//   - Уменьшение в 2 раза: 1000 * (2.0)³ * 1.0 = 8000 кредитов
//   - Увеличение в 2 раза:  1000 * (2.0)³       = 8000 кредитов
//   - Уменьшение в 4 раза: 1000 * (4.0)³ * 1.0 = 64000 кредитов
//   - Увеличение в 4 раза:  1000 * (4.0)³       = 64000 кредитов
//
// ПРИМЕР для penaltyMultiplier = 2.0:
//   Деталь за 1000 кредитов, уменьшенная в 2 раза:
//   1000 * (2.0)³ * 2.0 = 16000 кредитов
// ============================================================

TWEAKSCALE_HISCI_PENALTY
{
    // Показывать подробную информацию в логе KSP.log
    // true  — включить (помогает понять, какие детали затронуты)
    // false — выключить (для обычной игры)
    debugMode = true

    // Дополнительный множитель стоимости при УМЕНЬШЕНИИ детали
    // 1.0 = симметрично увеличению (рекомендуется)
    // 2.0 = миниатюризация в 2 раза дороже
    // 4.0 = миниатюризация в 4 раза дороже
    penaltyMultiplier = 1.0

    // ============================================================
    // ExclusionKeywords — КЛЮЧЕВЫЕ СЛОВА ИСКЛЮЧЕНИЯ
    // ============================================================
    // Если ВНУТРЕННЕЕ английское имя детали содержит любое из этих слов,
    // она НЕ будет считаться высокотехнологичной.
    // 
    // Сюда входят: баки, адаптеры, фермы, шасси, крылья, парашюты,
    // декаплеры, стыковочные узлы и т.д.
    ExclusionKeywords
    {
        keyword = tank
        keyword = fuel
        keyword = fuselage
        keyword = mono
        keyword = adapter
        keyword = bicoupler
        keyword = structural
        keyword = truss
        keyword = girder
        keyword = plate
        keyword = panel
        keyword = landing
        keyword = leg
        keyword = wheel
        keyword = gear
        keyword = parachute
        keyword = chute
        keyword = nosecone
        keyword = nose
        keyword = tail
        keyword = fin
        keyword = wing
        keyword = decoupler
        keyword = separator
        keyword = decouple
        keyword = launchclamp
        keyword = stackpoint
        keyword = docking
        keyword = apu
    }

    // ============================================================
    // WhiteList — БЕЛЫЙ СПИСОК
    // ============================================================
    // Детали, которые ВСЕГДА считаются высокотехнологичными,
    // даже если автоматические фильтры их пропустили.
    //
    // Указывайте ВНУТРЕННЕЕ английское имя детали (в скобках в логе).
    WhiteList
    {
        part = SurveyScanner
        part = dmAnomalyScanner
        part = dmDAN
    }

    // ============================================================
    // BlackList — ЧЁРНЫЙ СПИСОК
    // ============================================================
    // Детали, которые НИКОГДА не считаются высокотехнологичными,
    // даже если автоматические фильтры посчитали иначе.
    BlackList
    {
        // === Твердотопливные ускорители (простые, не high-tech) ===
        part = solidBooster1-1
        part = solidBooster.v2
        part = solidBooster.sm.v2
        part = MassiveBooster
        part = Shrimp
        part = Mite
        part = Thoroughbred
        part = Clydesdale
        part = Pollux
        part = restock-srb-mallet-1
        part = restock-srb-striker-1
        part = restock-srb-anvil-1
        part = restock-srb-castor-1

        // === Двигатели отвода ступеней и САС ===
        part = sepMotor1
        part = LaunchEscapeSystem

        // === Декаплеры со встроенными двигателями ===
        part = TPdecoupler0m
        part = TPdecoupler1m
        part = TPdecoupler2m
        part = TPdecoupler3m

        // === Стыковочные узлы ===
        part = stationHub
        part = dockingPort2
        part = dockingPortLateral
        part = dockingPort3
        part = dockingPort1
        part = dockingPortLarge

        // === Конструкционные элементы ===
        part = launchClamp1
        part = stackPoint1
        part = fuelLine

        // === Жилые отсеки ===
        part = mk3CrewCabin

        // === Вспомогательная силовая установка ===
        part = restock-apu-radial-1

        // === Солнечные панели (простая технология) ===
        part = solarPanelOX10C
        part = solarPanelSP10C
        part = solarPanelOX10L
        part = solarPanelSP10L
        part = solarPanels1
        part = solarPanels2
        part = solarPanels3
        part = solarPanels4
        part = solarPanels5
        part = largeSolarPanel
        part = LgRadialSolarPanel
        part = DeployedSolarPanel

        // === РИТЭГ (простой радиоизотопный генератор) ===
        part = rtg

        // === Топливные элементы ===
        part = FuelCell
        part = FuelCellArray

        // === Батареи ===
        part = batteryPack
        part = batteryBank
        part = batteryBankMini
        part = batteryBankLarge
        part = ksp.r.largeBatteryPack

        // === Наземный РИТЭГ ===
        part = DeployedRTG

        // === Солнечный щит  ===
        part = kspieSunShield

        // === Тепловые трубки и конвекторные радиаторы ===
        part = circradiatorKT
        part = circradiatorKThalf
    }

    // ============================================================
    // CategoryList — КАТЕГОРИИ ДЕТАЛЕЙ
    // ============================================================
    // Все детали из этих категорий автоматически считаются high-tech.
    //
    // Доступные категории KSP:
    // Pods, Propulsion, Control, Structural, Aero, Utility,
    // Science, Communication, Electrical, Ground, Payload, none
    CategoryList
    {
        category = Science
        category = Communication
    }

    // ============================================================
    // ModuleList — МОДУЛИ ДЕТАЛЕЙ
    // ============================================================
    // Если у детали есть любой из этих модулей — она high-tech.
    ModuleList
    {
        module = ModuleGenerator
        module = ModuleDataTransmitter
        module = ModuleScienceExperiment
        module = ModuleScienceContainer
        module = ModuleResourceConverter
        module = ModuleResourceHarvester
    }
}